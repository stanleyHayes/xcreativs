# Render Blueprint — backend API + managed Postgres + Redis.
# Frontend deploys separately on Vercel (see frontend/vercel.json).
#
# Migrations are NOT run on app start (no auto-migrate). After the first deploy,
# run them once against the Render database:
#   DB_URL=<render external connection string> make -C backend migrate-up
# (or add a Render "Job" that runs golang-migrate). Then `make seed` if desired.

databases:
  - name: xcreativs-db
    databaseName: xcreativs
    user: xcreativs
    postgresMajorVersion: "18"
    plan: basic-256mb

services:
  - type: keyvalue
    name: xcreativs-redis
    plan: starter # cheapest paid Key Value tier (free is not offered for Key Value)
    ipAllowList: [] # internal only

  - type: web
    name: xcreativs-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: DB_URL
        fromDatabase:
          name: xcreativs-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: xcreativs-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Public (non-secret) config — baked in so the production config validator
      # passes on boot. Adjust the domains once custom domains are mapped; the
      # *.vercel.app entries are for testing before DNS resolves.
      - key: BASE_URL
        value: https://portal.xcreativs.com
      - key: ALLOWED_ORIGINS
        value: https://xcreativs.com,https://www.xcreativs.com,https://portal.xcreativs.com,https://xcreativs-marketing.vercel.app,https://xcreativs-portal.vercel.app
      # Optional integrations — SECRETS, set in the Render dashboard (never commit
      # these to git). The API boots fine without them; features stay dormant
      # (e.g. /uploads returns 501 until Cloudinary is set).
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MFA_REQUIRED
        value: "true"
      # Apply embedded migrations automatically on boot (distroless image has no
      # migrate CLI). Safe to leave on — it only applies pending migrations.
      - key: RUN_MIGRATIONS
        value: "true"
      # Optional admin bootstrap: set in the dashboard as "email:password,email:password".
      # Passwords are bcrypt-hashed at runtime; remove after first successful login
      # so a restart can't reset a password changed in the UI.
      - key: SEED_ADMINS
        sync: false
