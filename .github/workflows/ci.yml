name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: backend
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test ./...
      - name: Build
        run: go build ./...
      - name: OpenAPI spec is in sync
        run: |
          go run ./cmd/genopenapi > internal/apispec/openapi.yaml
          git diff --exit-code internal/apispec/openapi.yaml \
            || (echo "::error::OpenAPI spec out of date — run 'make -C backend openapi' and commit"; exit 1)

  backend-integration:
    name: Backend integration (testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: Integration tests (real Postgres via testcontainers)
        run: go test -tags=integration ./internal/adapters/db/...

  migrations:
    name: Migrations round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: xcreatives
          POSTGRES_PASSWORD: xcreatives_dev
          POSTGRES_DB: xcreatives
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xcreatives"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install golang-migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate
      - name: Up then down
        env:
          DB_URL: postgres://xcreatives:xcreatives_dev@localhost:5432/xcreatives?sslmode=disable
        run: |
          migrate -path migrations -database "$DB_URL" up
          migrate -path migrations -database "$DB_URL" down -all

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: E2E
        run: npm run test:e2e
