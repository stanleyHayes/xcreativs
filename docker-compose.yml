version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xcreatives-postgres
    environment:
      POSTGRES_USER: xcreatives
      POSTGRES_PASSWORD: xcreatives_dev
      POSTGRES_DB: xcreatives
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
      - ./seeds:/seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xcreatives -d xcreatives"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xcreatives-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xcreatives-backend
    environment:
      - ENV=development
      - PORT=8080
      - DB_URL=postgres://xcreatives:xcreatives_dev@postgres:5432/xcreatives?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-xcreatives-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["air", "-c", ".air.toml"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xcreatives-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
