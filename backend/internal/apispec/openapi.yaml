openapi: 3.0.3
info:
  title: XCreativs Web Platform API
  version: "1.0"
  description: >
    REST API for the XCreativs platform. Bearer (JWT) auth is offered globally via the
    Authorize button; public endpoints ignore the token. Scoped API keys use the
    X-API-Key header. Generated from the live router — do not edit by hand;
    run `go run ./cmd/genopenapi > api/openapi.yaml`.
servers:
  - url: http://localhost:8081
    description: Local
  - url: /
    description: Same origin
tags:
  - { name: Health }
  - { name: Auth }
  - { name: Public }
  - { name: Careers }
  - { name: Tools }
  - { name: Concierge }
  - { name: Portal }
  - { name: Partner }
  - { name: Admin }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    apiKeyAuth: { type: apiKey, in: header, name: X-API-Key }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
security:
  - bearerAuth: []
